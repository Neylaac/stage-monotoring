<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mijn logboeken</title>

    <link rel="stylesheet" href="../CSS/logboeken.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    <div id="melding"></div>
    <aside class="sidebar">

        <div>
            <div class="sidebar-title">Student</div>

            <a href="/student/stageaanvraag" class="menu-item">
                <i class="fa-solid fa-graduation-cap"></i>
                <span>Stageaanvraag</span>
            </a>

            <a href="/student/home" id="homeLink" class="menu-item">
                <i class="fa-solid fa-house"></i>
                <span>Home</span>
            </a>


            <a href="/student/logboeken" class="menu-item active">
                <i class="fa-solid fa-book"></i>
                <span>Logboeken</span>
                <i class="fa-solid fa-lock lock"></i>
            </a>

            <a href="#" id="evaluatieLink" class="menu-item">
                <i class="fa-solid fa-clipboard-check"></i>
                <span>Evaluatie</span>
                <i class="fa-solid fa-lock lock"></i>
            </a>

            <a href="/rubriek" class="menu-item">
                <i class="fa-solid fa-table"></i>
                <span>Rubriek</span>
            </a>

        </div>

        <a href="/logout" class="logout">
            <i class="fa-solid fa-right-from-bracket"></i>
            <span>Uitloggen</span>
        </a>

    </aside>


    <main class="main-content">

        <header class="topbar">
            <i class="fa-regular fa-bell"></i>
            <div class="user-circle">NA</div>
            <span class="ehb-logo">ehbc</span>
        </header>

        <section class="content logboek-page">

            <h1>Mijn logboeken</h1>

            <div class="logboek-table-card">
                <table class="logboek-table">
                    <thead>
                        <tr>
                            <th>Week</th>
                            <th>Periode</th>
                            <th>Status</th>
                            <th>Actie</th>
                        </tr>
                    </thead>

                    <tbody id="wekenTabel"></tbody>
                </table>
            </div>

        </section>

    </main>

    <script src="/JS/student-toegang.js"></script>
    <script src="/JS/student-logboeken.js"></script>

</body>

</html>

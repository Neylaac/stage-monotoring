<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Itsme Verificatie</title>

    <link rel="stylesheet" href="../css/itsme.css">
</head>

<body>

    <div class="itsme-container">

        <div class="header">

            <h1>Identify yourself</h1>

            <div class="itsme-logo">
                itsme
            </div>

        </div>

        <div class="content">

            <div class="qr-section">

                <div class="qr-code">
    <img src="/images/itsme-qr.png" alt="QR Code">
</div>

            </div>

            <div class="instructions">

                <p>1. Open the itsme app on your smartphone</p>

                <p>2. Tap on QR scan</p>

                <p>3. Scan the QR code</p>

                <a href="#">Need help?</a>

            </div>

        </div>

        <div class="divider">

            <span>OR</span>

        </div>

        <div class="phone-section">

            <button class="phone-button">
                Use your phone number
            </button>

        </div>

    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daglogboek</title>

<link rel="stylesheet" href="../CSS/stageaanvraag.css">
<link rel="stylesheet" href="../CSS/home.css">
<link rel="stylesheet" href="../CSS/logboeken.css">
<link rel="stylesheet" href="../CSS/bedrijfhome.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

    <aside class="sidebar">

        <div>

            <div class="sidebar-title">Bedrijf</div>

            <a href="/bedrijf/home" class="menu-item">
                <i class="fa-solid fa-house"></i>
                <span>Home</span>
            </a>

            <a href="/bedrijf-stageovereenkomst-overzicht" class="menu-item"> <i class="fa-solid fa-user"></i>
                <span>Stagiairs</span>
            </a>

            <a href="/bedrijf/logboeken" class="menu-item active">
                <i class="fa-solid fa-book"></i>
                <span>Logboeken</span>
            </a>

            <a href="#" class="menu-item">
                <i class="fa-solid fa-clipboard-check"></i>
                <span>Evaluatie</span>
            </a>

            <a href="#" class="menu-item">
                <i class="fa-solid fa-user"></i>
                <span>Profiel</span>
            </a>

        </div>

        <a href="/logout" class="logout">
            <i class="fa-solid fa-right-from-bracket"></i>
            Uitloggen
        </a>

    </aside>

    <main class="main-content">

        <header class="topbar">

            <i class="fa-regular fa-bell"></i>

            <div class="user-circle">
                IM
            </div>

            <span class="ehb-logo">
                ebsc
            </span>

        </header>

        <section class="content daglogboek-page">

            <h1>Daglogboek</h1>

            <div class="dag-form">

                <div class="form-row">
                    <label>Datum</label>
                    <input id="datum" type="date" readonly>
                </div>

                <div class="form-row">
                    <label>Aantal uren</label>
                    <input id="aantalUren" type="number" readonly>
                </div>

                <div class="form-row large">
                    <label>Taken van vandaag</label>
                    <textarea id="taken" readonly></textarea>
                </div>

                <div class="form-row large">
                    <label>Wat heb ik geleerd?</label>
                    <textarea id="geleerd" readonly></textarea>
                </div>

                <div class="form-row large">
                    <label>Problemen / moeilijkheden</label>
                    <textarea id="problemen" readonly></textarea>
                </div>

            </div>

            <div class="competenties-section">

                <h2>Competenties</h2>

                <div class="competenties-grid">

                    <button class="competentie-btn" disabled>
                        Planning
                    </button>

                    <button class="competentie-btn" disabled>
                        Ontwerp
                    </button>

                    <button class="competentie-btn" disabled>
                        Implementatie
                    </button>

                    <button class="competentie-btn" disabled>
                        Integratie
                    </button>

                    <button class="competentie-btn" disabled>
                        Onderzoek
                    </button>

                    <button class="competentie-btn" disabled>
                        Communicatie
                    </button>

                    <button class="competentie-btn" disabled>
                        Probleemoplossing
                    </button>

                    <button class="competentie-btn" disabled>
                        Groei
                    </button>

                    <button class="competentie-btn" disabled>
                        Professionaliteit
                    </button>

                    <button class="competentie-btn" disabled>
                        Ondernemerschap
                    </button>

                    <button class="competentie-btn" disabled>
                        Ethiek
                    </button>

                </div>

            </div>

            <div class="form-actions">

                <a href="bedrijfweeklogboek.html" class="submit-btn">

                    Terug

                </a>

            </div>

        </section>

    </main>

    <script src="/JS/bedrijfdaglogboek.js"></script>


</body>

</html>

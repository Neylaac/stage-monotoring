<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Docent - Weeklogboek</title>

    <link rel="stylesheet" href="../CSS/logboeken.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<aside class="sidebar">
    <div>
        <div class="sidebar-title">Docent</div>

        <a href="/docent/home" class="menu-item">
            <i class="fa-solid fa-house"></i>
            <span>Home</span>
        </a>

        <a href="/docent/stageovereenkomsten" class="menu-item">
            <i class="fa-solid fa-briefcase"></i>
            <span>Stageovereenkomst</span>
        </a>

        <a href="/docent/studenten" class="menu-item active">
            <i class="fa-solid fa-graduation-cap"></i>
            <span>Studenten</span>
        </a>

    </div>

    <a href="/logout" class="logout">
        <i class="fa-solid fa-right-from-bracket"></i>
        <span>Uitloggen</span>
    </a>
</aside>

<main class="main-content">

    <header class="topbar">
        <i class="fa-regular fa-bell"></i>

        <div class="user-circle" id="docentInitialen">
            DO
        </div>

        <span class="ehb-logo">
            ehbc
        </span>
    </header>

    <section class="content">

        <h1 id="weekTitel">
            Weeklogboek
        </h1>

        <a id="terugKnop" href="/docent/logboeken" class="back-link">
            Terug naar logboeken
        </a>

        <div id="weekControle"></div>

        <div class="logboek-table-card">

            <table class="logboek-table">

                <thead>
                    <tr>
                        <th>Dag</th>
                        <th>Status</th>
                        <th>Actie</th>
                    </tr>
                </thead>

                <tbody id="daglogboekenTabel">
                    <tr>
                        <td colspan="3">
                            Dagen worden geladen.
                        </td>
                    </tr>
                </tbody>

            </table>

        </div>

    </section>

</main>

<script src="/JS/docentweeklogboek.js"></script>

</body>

</html>

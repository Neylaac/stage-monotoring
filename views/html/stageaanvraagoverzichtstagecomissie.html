<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stagecommissie - Stageaanvraag bekijken</title>

    <link rel="stylesheet" href="../CSS/stageaanvraag.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<aside class="sidebar">
    <div>
        <div class="sidebar-title">Stagecommissie</div>

        <a href="#" class="menu-item">
            <i class="fa-solid fa-house"></i>
            <span>Home</span>
        </a>

        <a href="stageaanvraagstagecommissie.html" class="menu-item active">
            <i class="fa-solid fa-graduation-cap"></i>
            <span>Stageaanvragen</span>
        </a>

        <a href="#" class="menu-item">
            <i class="fa-solid fa-clipboard-check"></i>
            <span>Stageovereenkomst</span>
        </a>

        <a href="#" class="menu-item">
            <i class="fa-solid fa-user"></i>
            <span>Profiel</span>
        </a>
    </div>

    <a href="#" class="logout">
        <i class="fa-solid fa-right-from-bracket"></i>
        Uitloggen
    </a>
</aside>

<main class="main-content">

    <header class="topbar">
        <i class="fa-regular fa-bell"></i>
        <div class="user-circle">SC</div>
        <span class="ehb-logo">ehbc</span>
    </header>

    <section class="content form-page">

        <h1 class="form-title">Stageaanvraag bekijken</h1>

        <form class="figma-form commissie-formulier">

            <div class="form-grid">

                <div class="form-card">
                    <div class="card-title">
                        <div class="icon-circle"><i class="fa-solid fa-user"></i></div>
                        <h2>Studentgegevens</h2>
                    </div>

                    <label>Naam</label>
                    <input type="text" data-commissie-aanvraag="naam" readonly>

                    <label>Achternaam</label>
                    <input type="text" data-commissie-aanvraag="achternaam" readonly>

                    <label>Studentnummer</label>
                    <input type="text" data-commissie-aanvraag="studentnummer" readonly>

                    <label>Opleiding</label>
                    <input type="text" data-commissie-aanvraag="opleiding" readonly>
                </div>

                <div class="form-card">
                    <div class="card-title">
                        <div class="icon-circle"><i class="fa-solid fa-briefcase"></i></div>
                        <h2>Stagegegevens</h2>
                    </div>

                    <label>Startdatum</label>
                    <input type="text" data-commissie-aanvraag="startdatum" readonly>

                    <label>Einddatum</label>
                    <input type="text" data-commissie-aanvraag="einddatum" readonly>

                    <label>Titel / Functie</label>
                    <input type="text" data-commissie-aanvraag="functie" readonly>
                </div>

                <div class="form-card">
                    <div class="card-title">
                        <div class="icon-circle"><i class="fa-solid fa-building"></i></div>
                        <h2>Bedrijfsgegevens</h2>
                    </div>

                    <label>Bedrijfsnaam</label>
                    <input type="text" data-commissie-aanvraag="bedrijfsnaam" readonly>

                    <label>Telefoonnummer</label>
                    <input type="text" data-commissie-aanvraag="telefoonnummer" readonly>

                    <label>Contactpersoon</label>
                    <input type="text" data-commissie-aanvraag="contactpersoon" readonly>

                    <label>Adres</label>
                    <input type="text" data-commissie-aanvraag="adres" readonly>

                    <label>E-mail</label>
                    <input type="text" data-commissie-aanvraag="emailBedrijf" readonly>
                </div>

                <div class="form-card docent-card">
                    <div class="card-title">
                        <div class="icon-circle"><i class="fa-solid fa-graduation-cap"></i></div>
                        <h2>Docentgegevens</h2>
                    </div>

                    <label>Naam</label>
                    <input type="text" data-commissie-aanvraag="docentNaam" readonly>

                    <label>E-mail</label>
                    <input type="text" data-commissie-aanvraag="docentEmail" readonly>
                </div>

            </div>

            <div class="form-card description-card">
                <div class="card-title">
                    <div class="icon-circle"><i class="fa-solid fa-clipboard-list"></i></div>
                    <h2>Omschrijving</h2>
                </div>

                <label>Opdracht</label>
                <input type="text" data-commissie-aanvraag="opdracht" readonly>

                <label>Omschrijving</label>
                <textarea data-commissie-aanvraag="omschrijving" readonly></textarea>
            </div>

           <div class="form-actions commissie-actions">
    <button type="button" id="btnAanpassing" class="btn-aanpassing">
        Aanpassingen vereist
    </button>

    <button type="button" id="btnAfkeuren" class="btn-afkeuren">
        Afkeuren
    </button>

    <button type="button" id="btnGoedkeuren" class="btn-goedkeuren">
        Goedkeuren
    </button>
</div>

        </form>

    </section>

</main>

<script src="../JS/stageaanvraag.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nieuwe stageaanvraag</title>

    <link rel="stylesheet" href="../CSS/stageaanvraag.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <aside class="sidebar">
        <div>
            <div class="sidebar-title">Student</div>

            <a href="stageaanvraag.html" class="menu-item active">
                <i class="fa-solid fa-graduation-cap"></i>
                <span>Stageaanvraag</span>
            </a>

            <a href="#" class="menu-item">
                <i class="fa-solid fa-house"></i>
                <span>Home</span>
                <i class="fa-solid fa-lock lock"></i>
            </a>

            <a href="#" class="menu-item">
                <i class="fa-solid fa-book"></i>
                <span>Logboeken</span>
                <i class="fa-solid fa-lock lock"></i>
            </a>

            <a href="#" class="menu-item">
                <i class="fa-solid fa-clipboard-check"></i>
                <span>Evaluatie</span>
                <i class="fa-solid fa-lock lock"></i>
            </a>

            <a href="#" class="menu-item">
                <i class="fa-solid fa-user"></i>
                <span>Profiel</span>
                <i class="fa-solid fa-lock lock"></i>
            </a>
        </div>

        <a href="#" class="logout">
            <i class="fa-solid fa-right-from-bracket"></i>
            Uitloggen
        </a>
    </aside>

    <main class="main-content">

        <header class="topbar">
            <i class="fa-regular fa-bell"></i>
            <div class="user-circle">NA</div>
            <span class="ehb-logo">ehbc</span>
        </header>

        <section class="content form-page">

            <h1 class="form-title">Nieuwe stageaanvraag invullen</h1>

            <form class="figma-form">

                <div class="form-grid">

                    <div class="form-card">
                        <div class="card-title">
                            <div class="icon-circle">
                                <i class="fa-solid fa-user"></i>
                            </div>
                            <h2>Studentgegevens</h2>
                        </div>

                        <label>Naam</label>
                        <input type="text" placeholder="..." readonly>

                        <label>Studentnummer</label>
                        <input type="text" placeholder="..." readonly>

                        <label>Opleiding</label>
                        <input type="text" placeholder="..." readonly>
                    </div>

                    <div class="form-card">
                        <div class="card-title">
                            <div class="icon-circle">
                                <i class="fa-solid fa-briefcase"></i>
                            </div>
                            <h2>Stagegegevens</h2>
                        </div>

                        <label>Startdatum</label>
                        <input type="date">

                        <label>Einddatum</label>
                        <input type="date">

                        <label>Titel / Functie</label>
                        <input type="text" placeholder="...">
                    </div>

                    <div class="form-card">
                        <div class="card-title">
                            <div class="icon-circle">
                                <i class="fa-solid fa-building"></i>
                            </div>
                            <h2>Bedrijfsgegevens</h2>
                        </div>

                        <label>Bedrijfsnaam</label>
                        <input type="text" placeholder="...">

                        <label>Telefoonnummer</label>
                        <input type="text" placeholder="...">

                        <label>Contactpersoon</label>
                        <input type="text" placeholder="...">

                        <label>Adres</label>
                        <input type="text" placeholder="...">

                        <label>E-mail</label>
                        <input type="email" placeholder="...">
                    </div>

                    <div class="form-card docent-card">
                        <div class="card-title">
                            <div class="icon-circle">
                                <i class="fa-solid fa-graduation-cap"></i>
                            </div>
                            <h2>Docentgegevens</h2>
                        </div>

                        <label>Naam</label>
                        <input type="text" placeholder="..." readonly>

                        <label>E-mail</label>
                        <input type="email" placeholder="..." readonly>
                    </div>

                </div>

                <div class="form-card description-card">
                    <div class="card-title">
                        <div class="icon-circle">
                            <i class="fa-solid fa-clipboard-list"></i>
                        </div>
                        <h2>Omschrijving</h2>
                    </div>

                    <label>Opdracht</label>
                    <input type="text" placeholder="...">

                    <label>Omschrijving</label>
                    <textarea placeholder="..."></textarea>
                </div>

                <div class="form-actions">
                    <button type="button" class="concept-btn">Opslaan als concept</button>
                    <a href="stageaanvraag-overzicht.html" class="submit-btn">Indienen</a>
                </div>

            </form>

        </section>

    </main>

</body>
</html>

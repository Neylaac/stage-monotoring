<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../CSS/login.css">
    <title>Login Pagina</title>
</head>

<body>
    <div class="login-container">
        <div class="links">
            <h1>YOUR<br>FUTURE<br>STARTS<br>IN<br>BRUSSELS.</h1>
        </div>

        <div class="rechts">
            <div class="form-box " id="login-box">
                <h2>Login</h2>

                <form id="login-form" action="/login" method="POST">
                    <div class="input-box">
                        <input type="email" id="email" placeholder="Email" required>

                    </div>

                    <div class="input-box">
                        <input type="password" id="wachtwoord" placeholder="Password" required>

                    </div>

                    <a href="#" class="forgot-password">Wachtwoord vergeten?</a>

                    <button type="submit" class="btn-login">Inloggen</button>

                    <p class="register-text">
                        Don't have an account?
                        <a href="#" id="show-register">Register</a>
                </form>
            </div>
        </div>

            <div class="form-box hidden" id="register-box">
                <h2>Register</h2>

                <form id="register-form" action="/register" method="POST">
                    <div class="input-box">
                        <input type="register-voornaam" id="voornaam" placeholder="Voornaam" required>
                    </div>
                    <div class="input-box">
                        <input type="register-achternaam" id="achternaam" placeholder="Achternaam" required>
                    </div>
                    <div class="input-box">
                        <input type="email" id="email" placeholder="Email" required>
                    </div>
                    <div class="input-box">
                        <input type="password" id="wachtwoord" placeholder="Password" required>
                    </div>


                    <button type="submit" class="btn-login">Registreren</button>

                    <p class="register-text">
                        Already have an account?
                        <a href="#" id="show-login">Login</a>
                    </p>
                </form>
            </div>
        </div>
    </div>

    <script src="../JS/loginAuth.js"></script>
</body>

</html>
